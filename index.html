<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>利息宝 - 云端同步版</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0c0c0e; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        /* 登录界面样式 */
        #login-view { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #12141a; position: fixed; width: 100%; z-index: 100; }
        .login-logo { font-size: 32px; font-weight: bold; color: #d4af37; margin-bottom: 40px; letter-spacing: 4px; }
        .input-item { width: 80%; max-width: 320px; margin-bottom: 25px; }
        .login-input { width: 100%; padding: 18px; background: #1c1e24; border: 1px solid #2d3039; border-radius: 12px; color: #fff; font-size: 18px; outline: none; box-sizing: border-box; text-align: center; letter-spacing: 2px; }
        .login-btn { width: 80%; max-width: 320px; padding: 18px; background: #d4af37; color: #000; border-radius: 12px; font-weight: bold; text-align: center; cursor: pointer; font-size: 18px; border: none; }
        
        /* 主界面样式 */
        #main-view { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .banner { margin: 10px 15px; border-radius: 15px; height: 150px; background: linear-gradient(45deg, #0f0c29, #302b63, #24243e); border: 1px solid #333; display: flex; align-items: center; justify-content: center; text-align: center; }
        .banner-title { font-size: 24px; font-weight: bold; color: #fff; }
        .renew-btn { background: #ff4500; color: #fff; padding: 8px 20px; border-radius: 6px; font-size: 13px; margin-top: 10px; display: inline-block; font-weight: bold; cursor: pointer; min-width: 110px; }
        .renew-btn.locked { background: #333; color: #888; cursor: not-allowed; border: 1px solid #444; }

        .asset-box { padding: 25px 20px; }
        .amount-row { font-size: 32px; font-weight: bold; margin: 10px 0; display: flex; align-items: baseline; }
        .cny-text { font-size: 14px; color: #777; font-weight: normal; margin-left: 8px; }
        .stat-val { font-size: 26px; font-weight: bold; color: #d4af37; }
        .btn-row { display: flex; gap: 15px; padding: 0 20px; }
        .opt-btn { flex: 1; height: 50px; line-height: 50px; text-align: center; border: 1px solid #d4af37; color: #d4af37; border-radius: 8px; font-weight: 500; }
        
        .faq-title { font-weight: bold; padding: 20px; border-top: 8px solid #000; margin-top: 20px; }
        .faq-item { display: flex; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid #1a1a1c; color: #ccc; font-size: 15px; }
        
        #toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 25, 0.95); color: #fff; padding: 20px; border-radius: 12px; z-index: 1000; display: none; border: 1px solid #d4af37; width: 75%; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="toast" onclick="this.style.display='none'"></div>

    <div id="login-view">
        <div class="login-logo">利息宝</div>
        <div class="input-item">
            <input type="password" id="u-key" class="login-input" placeholder="请输入安全秘钥">
        </div>
        <div class="login-btn" onclick="checkAuth()">安全验证</div>
    </div>

    <div id="main-view">
        <div class="header">
            <span onclick="logout()" style="color:#666">〈 退出</span>
            <b>利息宝</b>
            <span>🔔</span>
        </div>

        <div class="banner">
            <div>
                <div style="font-size: 10px; color: #d4af37;">超高收益 即存即赚</div>
                <div class="banner-title">独家过夜利息</div>
                <div id="renew-btn" class="renew-btn" onclick="handleRenew()">立即续存</div>
            </div>
        </div>

        <div class="asset-box">
            <div style="display: flex; justify-content: space-between; color: #888; font-size: 14px;">
                <span>总资产 (USDT)</span>
                <span style="color: #d4af37;">转账记录 〉</span>
            </div>
            <div class="amount-row">
                <span id="bal-val">0.00</span>
                <span class="cny-text" id="cny-val">≈0 CNY</span>
            </div>
            <div style="display: flex; margin-top: 25px;">
                <div style="flex: 1;">
                    <div style="color: #888; font-size: 12px; margin-bottom: 5px;">累计收益</div>
                    <div class="stat-val" id="pro-val">0.00</div>
                </div>
                <div style="flex: 1;">
                    <div style="color: #888; font-size: 12px; margin-bottom: 5px;">预期年化</div>
                    <div style="font-size: 24px; font-weight: bold;">15%-36%</div>
                </div>
            </div>
        </div>

        <div class="btn-row">
            <div class="opt-btn" onclick="showTip('点击转出资金输入地址即可。')">转出</div>
            <div class="opt-btn" onclick="showTip('通用钱包授权转入。')">转入</div>
        </div>

        <div class="faq-title">常见问题</div>
        <div class="faq-item" onclick="showTip('每7天一个周期，利息自动结算,到期后需要手动点击续存。')">过夜利息基本规则? <span>〉</span></div>
        <div class="faq-item" onclick="showTip('通过欧易钱包授权转入。')">如何转入资金？ <span>〉</span></div>
        <div class="faq-item" onclick="showTip('点击转出资金输入欧易钱包地址即可。')">如何转出资金？ <span>〉</span></div>
        <div class="faq-item" onclick="showTip('目前初次存入7天后自动收益.')">多久才能有收益？ <span>〉</span></div>
        <div class="faq-item" onclick="showTip('没有限制。')">存入时间有限制吗？ <span>〉</span></div>
    </div>

    <script>
        // --- 请确保这里填入你的真实 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "oyweb3.firebaseapp.com",
            databaseURL: "https://oyweb3-default-rtdb.firebaseio.com", //
            projectId: "oyweb3",
            storageBucket: "oyweb3.appspot.com",
            messagingSenderId: "你的ID",
            appId: "你的APPID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const assetRef = database.ref('user_assets'); //
        const settingRef = database.ref('settings'); //

        let cloudKey = ""; 
        let timer = null;

        // 预加载云端秘钥
        settingRef.child('securityKey').on('value', (s) => { cloudKey = String(s.val()); });

        function showTip(m) {
            const t = document.getElementById('toast');
            t.innerHTML = m + '<br><br><small style="color:#666">点击关闭</small>';
            t.style.display = 'block';
        }

        // 登录验证：对比本地输入与云端秘钥
        function checkAuth() {
            const input = document.getElementById('u-key').value;
            if(cloudKey && input === cloudKey) {
                localStorage.setItem('auth_token_v5', input);
                initApp();
            } else { 
                alert("秘钥验证错误"); 
            }
        }

        function initApp() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            
            // 实时同步云端数据变化
            assetRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // 更新资产 UI
                    const f = (n) => (n || 0).toLocaleString('en-US', {minimumFractionDigits: 2});
                    document.getElementById('bal-val').innerText = f(data.balance);
                    document.getElementById('pro-val').innerText = f(data.profit);
                    document.getElementById('cny-val').innerText = `≈${Math.floor(data.balance * 7.1).toLocaleString()} CNY`;
                    
                    // 同步倒计时状态
                    if(data.endTime && data.endTime > Date.now()) {
                        startTimer(data.endTime);
                    } else {
                        resetBtn();
                    }
                }
            });
        }

        // 点击续存：将时间戳更新到云端
        function handleRenew() {
            if(document.getElementById('renew-btn').classList.contains('locked')) return;
            const target = Date.now() + (7 * 24 * 60 * 60 * 1000);
            assetRef.update({ endTime: target });
        }

        function startTimer(endTime) {
            const btn = document.getElementById('renew-btn');
            btn.classList.add('locked');
            if(timer) clearInterval(timer);
            timer = setInterval(() => {
                const remain = endTime - Date.now();
                if(remain <= 0) {
                    clearInterval(timer);
                    assetRef.update({ endTime: 0 }); // 到期自动归零
                } else {
                    const d = Math.floor(remain / 86400000);
                    const h = Math.floor((remain % 86400000) / 3600000);
                    const m = Math.floor((remain % 3600000) / 60000);
                    const s = Math.floor((remain % 60000) / 1000);
                    btn.innerText = (d > 0 ? d + "天 " : "") + `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
            }, 1000);
        }

        function resetBtn() {
            const btn = document.getElementById('renew-btn');
            btn.innerText = "立即续存";
            btn.classList.remove('locked');
            if(timer) clearInterval(timer);
        }

        function logout() { localStorage.removeItem('auth_token_v5'); location.reload(); }

        window.onload = () => {
            // 自动登录检测
            if (localStorage.getItem('auth_token_v5')) {
                settingRef.child('securityKey').once('value', (s) => {
                    if(localStorage.getItem('auth_token_v5') === String(s.val())) {
                        initApp();
                    } else { logout(); }
                });
            }
        };
    </script>
</body>
</html>
